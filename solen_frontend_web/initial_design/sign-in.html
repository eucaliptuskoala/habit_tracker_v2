<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Solen</title>
<link rel="stylesheet" href="css/solen.css">
<style>
  .auth-container {
    max-width: 420px;
    margin: 0 auto;
    padding-top: clamp(60px, 15vh, 120px);
  }
  .auth-header {
    text-align: center;
    margin-bottom: var(--space-xl);
  }
  .auth-header .auth-sun {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 auto var(--space-lg);
    box-shadow: 0 0 40px oklch(68% 0.16 75 / 0.2);
  }
  .auth-header h1 { margin-bottom: var(--space-sm); }
  .auth-header p { color: var(--muted); font-size: 0.9rem; }

  .auth-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-xl);
  }
  .auth-form .field { margin-bottom: var(--space-lg); }
  .auth-form label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: var(--space-sm);
  }
  .auth-form .btn-primary { width: 100%; justify-content: center; }
  .auth-form .forgot-link {
    display: block;
    text-align: right;
    font-size: 0.85rem;
    margin-top: var(--space-sm);
  }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin: var(--space-lg) 0;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .auth-divider::before,
  .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .auth-footer {
    text-align: center;
    margin-top: var(--space-lg);
    font-size: 0.9rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<nav class="nav-bar">
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-sun"></span>
    Solen
  </a>
</nav>

<main class="auth-container animate-in">
  <div class="auth-header">
    <div class="auth-sun"></div>
    <h1 class="display-lg">Welcome back</h1>
    <p>Sign in to continue your practice.</p>
  </div>

  <form class="auth-form" onsubmit="event.preventDefault(); signIn()">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" class="input" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" class="input" placeholder="Your password" required>
      <a href="#" class="forgot-link body-sm">Forgot password?</a>
    </div>
    <button type="submit" class="btn btn-primary">Sign in</button>

    <div class="auth-divider">or</div>

    <button type="button" class="btn" style="width:100%;justify-content:center" onclick="alert('Google sign-in')">
      <svg viewBox="0 0 18 18" width="16" height="16"><path d="M17.6 9.2c0-.6-.05-1.2-.15-1.8H9v3.4h4.85a4 4 0 01-1.75 2.6v2.2h2.85c1.65-1.5 2.65-3.7 2.65-6.4z" fill="#4285F4"/><path d="M9 18c2.4 0 4.4-.8 5.9-2.2l-2.85-2.2c-.8.5-1.8.8-3.05.8-2.35 0-4.35-1.6-5.05-3.7H1v2.2C2.45 15.8 5.5 18 9 18z" fill="#34A853"/><path d="M3.95 10.9A5.4 5.4 0 013.75 9c0-.65.1-1.3.2-1.9V4.9H1a9 9 0 000 8.2l2.95-2.2z" fill="#FBBC05"/><path d="M9 3.6c1.3 0 2.45.45 3.35 1.3l2.5-2.5C13.4.9 11.4 0 9 0 5.5 0 2.45 2.2 1 5.4l2.95 2.2C4.65 5.2 6.65 3.6 9 3.6z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="sign-up.html">Create one</a>
  </div>
</main>

<script>
function signIn() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) {
    alert('Please enter your email and password.');
    return;
  }
  window.location.href = 'dashboard.html';
}
</script>

</body>
</html>
