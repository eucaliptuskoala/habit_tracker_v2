<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Solen</title>
<link rel="stylesheet" href="css/tailwind-solen.css">
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-solen-bg text-solen-fg font-body antialiased min-h-screen">

<nav class="flex items-center justify-between h-16 max-w-[1280px] mx-auto px-[var(--gutter,24px)]">
  <a href="index_tail.html" class="flex items-center gap-[10px] font-display text-[1.35rem] tracking-[-0.01em] text-solen-fg no-underline">
    <span class="relative w-7 h-7 rounded-full bg-solen-accent flex-shrink-0
      after:content-[''] after:absolute after:inset-[-6px] after:rounded-full after:border after:border-solen-accent after:opacity-30"></span>
    Solen
  </a>
</nav>

<main class="max-w-[420px] mx-auto px-[var(--gutter,24px)] pt-[clamp(60px,15vh,120px)] animate-[fade-in_0.5s_ease_both]">
  <div class="text-center mb-[var(--space-xl,64px)]">
    <div class="w-10 h-10 rounded-full bg-solen-accent mx-auto mb-[var(--space-lg,32px)] shadow-[0_0_40px_oklch(68%_0.16_75_/_0.2)]"></div>
    <h1 class="font-display text-[clamp(2rem,3.5vw,3rem)] leading-[1.15] tracking-[-0.015em] font-[400] text-solen-fg mb-[var(--space-sm,8px)]">Welcome back</h1>
    <p class="text-[0.9rem] text-solen-muted">Sign in to continue your practice.</p>
  </div>

  <form class="bg-solen-surface border border-solen-border rounded-[8px] p-[var(--space-xl,64px)]" onsubmit="event.preventDefault(); signIn()">
    <div class="mb-[var(--space-lg,32px)]">
      <label for="email" class="block font-mono text-[0.7rem] tracking-[0.08em] uppercase text-solen-muted mb-[var(--space-sm,8px)]">Email</label>
      <input type="email" id="email" class="w-full px-4 py-3 border border-solen-border rounded-[8px] bg-solen-surface text-[1rem] text-solen-fg outline-none transition-[border-color] duration-200 placeholder:text-solen-muted/60 focus:border-solen-accent focus:shadow-[0_0_0_3px_oklch(68%_0.16_75_/_0.1)]" placeholder="you@example.com" required>
    </div>
    <div class="mb-[var(--space-lg,32px)]">
      <label for="password" class="block font-mono text-[0.7rem] tracking-[0.08em] uppercase text-solen-muted mb-[var(--space-sm,8px)]">Password</label>
      <input type="password" id="password" class="w-full px-4 py-3 border border-solen-border rounded-[8px] bg-solen-surface text-[1rem] text-solen-fg outline-none transition-[border-color] duration-200 placeholder:text-solen-muted/60 focus:border-solen-accent focus:shadow-[0_0_0_3px_oklch(68%_0.16_75_/_0.1)]" placeholder="Your password" required>
      <a href="#" class="block text-right text-[0.85rem] text-solen-accent no-underline hover:underline mt-[var(--space-sm,8px)]">Forgot password?</a>
    </div>
    <button type="submit" class="w-full inline-flex items-center justify-center gap-2 px-7 py-3 rounded-[8px] text-[0.95rem] font-medium text-[var(--color-solen-surface)] bg-solen-accent border border-solen-accent no-underline hover:bg-solen-accent-glow hover:border-solen-accent-glow hover:shadow-[0_0_24px_oklch(78%_0.18_80_/_0.25)] transition-all duration-200 cursor-pointer font-body">Sign in</button>

    <div class="flex items-center gap-[var(--space-md,16px)] my-[var(--space-lg,32px)] font-mono text-[0.7rem] text-solen-muted tracking-[0.05em]
      before:content-[''] before:flex-1 before:h-px before:bg-solen-border
      after:content-[''] after:flex-1 after:h-px after:bg-solen-border">or</div>

    <button type="button" class="w-full inline-flex items-center justify-center gap-2 px-7 py-3 rounded-[8px] text-[0.95rem] font-medium border border-solen-border bg-transparent text-solen-fg no-underline hover:bg-solen-surface-soft transition-all duration-200 cursor-pointer font-body" onclick="alert('Google sign-in')">
      <svg viewBox="0 0 18 18" width="16" height="16"><path d="M17.6 9.2c0-.6-.05-1.2-.15-1.8H9v3.4h4.85a4 4 0 01-1.75 2.6v2.2h2.85c1.65-1.5 2.65-3.7 2.65-6.4z" fill="#4285F4"/><path d="M9 18c2.4 0 4.4-.8 5.9-2.2l-2.85-2.2c-.8.5-1.8.8-3.05.8-2.35 0-4.35-1.6-5.05-3.7H1v2.2C2.45 15.8 5.5 18 9 18z" fill="#34A853"/><path d="M3.95 10.9A5.4 5.4 0 013.75 9c0-.65.1-1.3.2-1.9V4.9H1a9 9 0 000 8.2l2.95-2.2z" fill="#FBBC05"/><path d="M9 3.6c1.3 0 2.45.45 3.35 1.3l2.5-2.5C13.4.9 11.4 0 9 0 5.5 0 2.45 2.2 1 5.4l2.95 2.2C4.65 5.2 6.65 3.6 9 3.6z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
  </form>

  <div class="text-center mt-[var(--space-lg,32px)] text-[0.9rem] text-solen-muted">
    Don't have an account? <a href="sign-up_tail.html" class="text-solen-accent no-underline hover:underline">Create one</a>
  </div>
</main>

<script>
function signIn() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  if (!email || !password) {
    alert('Please enter your email and password.');
    return;
  }
  window.location.href = 'dashboard_tail.html';
}
</script>

</body>
</html>
