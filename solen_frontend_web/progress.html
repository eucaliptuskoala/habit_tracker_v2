<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Progress — Solen</title>
<link rel="stylesheet" href="css/solen.css">
<style>
  .progress-header { margin-bottom: var(--space-xl); }

  .chart-grid {
    display: grid;
    gap: var(--space-lg);
  }

  .chart-section { margin-bottom: var(--space-xl); }
  .chart-section h2 {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: var(--space-md);
  }

  /* Calendar Heatmap */
  .heatmap-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-lg);
    overflow-x: auto;
  }
  .heatmap-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-md);
  }
  .heatmap-months {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 0;
    margin-bottom: var(--space-sm);
    padding-left: 28px;
  }
  .heatmap-months span {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
  }
  .heatmap-grid {
    display: flex;
    gap: 3px;
  }
  .heatmap-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .heatmap-cell {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    background: var(--surface-soft);
  }
  .heatmap-cell[data-l="0"] { background: var(--surface-soft); }
  .heatmap-cell[data-l="1"] { background: oklch(88% 0.03 85); }
  .heatmap-cell[data-l="2"] { background: oklch(80% 0.06 80); }
  .heatmap-cell[data-l="3"] { background: oklch(72% 0.10 78); }
  .heatmap-cell[data-l="4"] { background: oklch(64% 0.14 76); }
  .heatmap-cell[data-l="5"] { background: var(--accent); }
  .heatmap-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: var(--space-md);
    justify-content: flex-end;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
  }
  .heatmap-legend-cell {
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }

  /* Line Chart (CSS-only bar approximation) */
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-lg);
  }
  .chart-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-lg);
  }
  .chart-title h3 {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 400;
  }
  .chart-title .stat {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 160px;
  }
  .bar {
    flex: 1;
    border-radius: 3px 3px 0 0;
    background: oklch(72% 0.10 78);
    transition: height 0.3s;
    min-height: 4px;
    position: relative;
  }
  .bar:hover { background: var(--accent); }
  .bar-labels {
    display: flex;
    gap: 6px;
    margin-top: var(--space-sm);
  }
  .bar-labels span {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
  }

  .practice-charts {
    display: grid;
    gap: var(--space-md);
  }

  @media (min-width: 768px) {
    .chart-grid {
      grid-template-columns: 1fr 1fr;
    }
  }
</style>
</head>
<body>

<nav class="nav-bar">

      </a>
      <a href="inspire.html" class="nav-dropdown-item">
        <svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="9" cy="9" r="2" fill="currentColor"/></svg>
        Inspire

      <div class="nav-dropdown-divider"></div>
      <button class="nav-dropdown-item" onclick="signOut()">Sign out</button>
    </div>
  </div>
</nav>

<script>
function toggleNav() {
  const menu = document.getElementById('navMenu');
  const chevron = document.querySelector('.nav-dropdown-chevron');
  menu.classList.toggle('open');
  chevron.classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const menu = document.getElementById('navMenu');
  const trigger = document.querySelector('.nav-dropdown-trigger');
  if (!trigger.contains(e.target) && !menu.contains(e.target)) {
    menu.classList.remove('open');
    document.querySelector('.nav-dropdown-chevron')?.classList.remove('open');
  }
});
function signOut() { window.location.href = 'landing.html'; }
</script>

</body>
</html>
